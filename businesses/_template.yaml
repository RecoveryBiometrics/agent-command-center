# _template.yaml — Copy this file for a new business
# Rename to: {business-slug}.yaml (e.g., gutterguard.yaml)
#
# After filling this out:
#   1. Push agent-command-center (dashboard auto-updates)
#   2. Run /new-project to create the project directory
#   3. Run /deploy-team to set up pipelines
#
# Delete any sections that don't apply. Leave TODOs for things you'll fill in later.

id: # short slug, no spaces (e.g., safebath, gutterguard)
name: # display name (e.g., "GutterGuard Pro")
status: building  # building | live | paused | planned
website: # https://...
niche: # one line (e.g., "gutter installation, home maintenance")
description: # one sentence for the dashboard

# -- Org --
org:
  director: # dir-{slug}
  director_name: # Director of {Name}
  reportsTo: vp-growth  # or vp-product
  github: # RecoveryBiometrics/{repo-name}
  path: # ~/Projects/{slug}/ or ~/Developer/projects/{slug}/
  terminal_shortcut: # shell function name

# -- Brand --
brand:
  phone_display: # "(555) 123-4567"
  phone_tel: # "+15551234567"
  email: # info@example.com
  cta: # "Call Today for a Free Estimate"
  voice: # tone/style description for content generation

# -- Service Areas (if local service business) --
# service_areas:
#   states: []
#   cities_per_run: 8
#   phone_overrides:
#     "County, ST":
#       display: "(555) 999-8888"
#       tel: "+15559998888"

# -- Slack Channels --
slack:
  ops_log_channel: C0AQG0DP222  # shared #ops-log
  ceo_channel: C0AQAHSQK38     # shared #ceo-briefing
  business_channel: # create a new channel, put its ID here

