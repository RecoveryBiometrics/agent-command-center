# -- Secrets (names only — actual values go in .env / GitHub Secrets) --
secrets:
  anthropic_api_key: ANTHROPIC_API_KEY
  google_genai_api_key: GOOGLE_GENAI_API_KEY
  slack_bot_token: SLACK_BOT_TOKEN

# -- Teams to Deploy --
# Uncomment the teams you want. Run /deploy-team after.
teams: []
