# -- Content Pipeline Config --
content:
  output_dir: src/data/local-news
  changelog_path: src/data/content-changelog.json
  city_slug_prefix: electrician  # URL pattern: /electrician-{city}-nc
  max_similarity_percent: 70  # stricter than SafeBath's 85; P2P uses ≤30% body-copy overlap rule per plan thin-content rules
  max_retry_attempts: 3
  # Hub-and-spoke architecture (per approved plan v5)
  architecture: hub-and-spoke
  tier_a_flagships:
    - /
    - /electrical-panels/
    - /ev-charging/
    - /electrical-service/
  tier_b_hubs:
    - /historic-home-wiring/
    - /construction/
  authority_library_path: /guides/
  categories:
    - service-page
    - hub-page
    - city-page
    - neighborhood-page
    - authority-pillar  # Attia-style
    - faq-post
    - partnership-landing
  subreddits:
    - AshevilleNC
    - HomeImprovement
    - electricians
    - electricvehicles
    - RealEstate

# -- Authority Library (Pillar 3 per plan) --
# Peter Attia-style long-form, diagram-heavy, Andrew-bylined, Andrew-narrated video
authority_library:
  enabled: true
  target_word_count: 3500  # 3000-8000 range
  diagrams_per_pillar: 1  # minimum; Claude-generated SVG/Mermaid → Figma/Canva refine
  video_per_pillar: true  # Andrew records 3-5 min phone walkthrough
  opus_reviewer_gate: true  # pattern ported from verticals-pipeline language_reviewer.py
  pillars:
    - slug: how-home-electricity-works
      priority: 1
    - slug: electrical-panel-anatomy
      priority: 2
    - slug: wiring-types-through-the-decades
      priority: 3
    - slug: afci-gfci-explained
      priority: 4
    - slug: home-electrical-load-calculation
      priority: 5
    - slug: asheville-electrical-code
      priority: 6
    - slug: ev-home-charging-complete-guide
      priority: 7
    - slug: historic-home-electrical-safety
      priority: 8

# -- Content Builder --
content_builder:
  enabled: true
  max_todos_per_run: 3
  model: claude-haiku-4-5-20251001
  min_impressions_for_gap: 25  # smaller market than SafeBath
  auto_deploy_articles: false  # require human review for P2P while we extract LSB pattern
  auto_deploy_pages: false

# -- Interlinking --
interlinking:
  enabled: true
  max_outbound_links_per_page: 12
  max_related_links_per_article: 3
  neighbor_count: 5
  # Hub-and-spoke cross-link rules
  panel_to_ev_crosslink: true  # trojan horse relationship
  historic_to_knob_tube_crosslink: true

# -- Thin Content Prevention (per plan hard rules) --
thin_content_rules:
  min_words_authority_pillar: 3000
  min_words_hub: 1800
  min_words_service_spoke: 1500
  min_words_city_page: 800
  min_words_faq_post: 1000
  max_body_overlap_pct: 30
  opus_reviewer_gate: true
  no_fabrication: true  # enforces p2p-seo existing fact-check rule + RULE #0 from verticals-pipeline

# -- GEO (Generative Engine Optimization) --
geo:
  enabled: true
  schema_stack:
    - LocalBusiness
    - Service
    - FAQPage
    - HowTo
    - Article
    - Person  # Andrew with license # + sameAs
    - BreadcrumbList
    - AggregateRating
  entity_sameAs:
    - # TODO Andrew LinkedIn
    - # TODO P2P Google Business Profile URL
    - # TODO BBB profile URL
    - # TODO Asheville Chamber profile URL (pending Chamber signup)
  unique_data_requirement: true  # every page must include ≥1 P2P-specific data point (actual job count, Asheville-specific cost range, etc.)
  llm_citation_monitoring: weekly  # ChatGPT / Perplexity / Claude / Google AI Overviews

# -- NotebookLM Production Pipeline --
notebooklm:
  enabled: true  # requires Google Workspace Business Standard (bundles NotebookLM Plus)
  tier_required: workspace_business_standard  # 300 sources/notebook
  outputs_per_pillar:
    - audio_overview  # feeds podcast-pipeline
    - video_overview  # YouTube distribution + embed
    - study_guide  # email nurture + realtor/GC handoff PDF
    - faq_document  # grounded Q&A for FAQ cluster posts
    - mind_map  # site architecture validation

